<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriesScore - Kontakt</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/Slutprojekt.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <span class="logo">SeriesScore</span>
            <nav>
                <ul>
                    <li><a href="startsida.html">Sök</a></li>
                    <li><a href="kontakt.html" class="active">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-section">
            <h1>Kontakta oss</h1>
            <form class="form-wrapper" id="contactForm" novalidate>
                <div class="form-group">
                    <label for="name">Namn</label>
                    <input type="text" id="name" placeholder="Ditt namn" required>
                </div>
                <div class="form-group">
                    <label for="email">E-post</label>
                    <input type="email" id="email" placeholder="din@email.se" required>
                </div>
                <div class="form-group">
                    <label for="subject">Ärende</label>
                    <input type="text" id="subject" placeholder="Vad gäller det?" required>
                </div>
                <div class="form-group">
                    <label for="message">Meddelande</label>
                    <textarea id="message" rows="5" placeholder="Skriv ditt meddelande här..." required></textarea>
                </div>
                <p id="formMsg" class="form-msg hidden"></p>
                <button type="submit" id="submitBtn">Skicka</button>
            </form>
        </section>
    </main>

    <footer>
        <p>SeriesScore &copy; 2025 — Data från TMDB</p>
    </footer>

    <script src="../javascript/slutprojekt.js"></script>
</body>
</html>
